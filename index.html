 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia Tipo Excel</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f6fa;
}

.topbar{
  padding:10px;
  background:#1e3a8a;
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn-add{
  background:#22c55e;
  color:white;
}

.container{
  overflow:auto;
  height:calc(100vh - 50px);
}

table{
  border-collapse:collapse;
  min-width:1200px;
  background:white;
}

th, td{
  border:1px solid #ddd;
  padding:4px;
  text-align:center;
  font-size:12px;
}

th{
  background:#1e40af;
  color:white;
  position:sticky;
  top:0;
  z-index:2;
}

th.month{
  background:#374151;
}

td.name{
  text-align:left;
  font-weight:bold;
  background:#f3f4f6;
  position:sticky;
  left:0;
  z-index:1;
}

td.num{
  background:#e5e7eb;
  position:sticky;
  left:0;
  z-index:2;
}

select{
  width:40px;
  border:none;
  text-align:center;
  font-weight:bold;
}

/* colores */
.s-A{background:#22c55e;color:white;}
.s-F{background:#ef4444;color:white;}
.s-T{background:#f59e0b;color:white;}
.s-E{background:#3b82f6;color:white;}

</style>
</head>

<body>

<div class="topbar">
  <div><b>Curso 1003</b></div>
  <button class="btn-add" onclick="addMonth()">+ Mes</button>
</div>

<div class="container" id="app"></div>

<script>

const START_DATE = '2026-04-13';

const STUDENTS = [
  "ACOSTA PATERNINA ISABELLA",
  "BECERRA MAYO JERONIMO",
  "BONILLA GALINDA BRIAN",
  "CAMACHO OSPINA MICHAEL",
  "CASTRO LADINO DAVID"
];

let data = {};

// generar días lunes a viernes
function generateDates(start, countWeeks){
  let dates = [];
  let d = new Date(start);

  for(let w=0; w<countWeeks; w++){
    for(let i=0;i<5;i++){
      let c = new Date(d);
      c.setDate(d.getDate()+i);
      dates.push(format(c));
    }
    d.setDate(d.getDate()+7);
  }

  return dates;
}

function format(d){
  return d.toISOString().split('T')[0];
}

let dates = generateDates(START_DATE, 4);

function groupMonths(dates){
  let res = [];
  let current = null;

  dates.forEach(d=>{
    let m = new Date(d).toLocaleString('es',{month:'long'});

    if(!current || current.name !== m){
      current = {name:m, count:1};
      res.push(current);
    }else{
      current.count++;
    }
  });

  return res;
}

function render(){

  let container = document.getElementById("app");

  let table = document.createElement("table");

  let months = groupMonths(dates);

  // fila meses
  let tr1 = document.createElement("tr");
  tr1.innerHTML = "<th>#</th><th>Estudiante</th>";

  months.forEach(m=>{
    let th = document.createElement("th");
    th.className="month";
    th.colSpan = m.count;
    th.innerText = m.name.toUpperCase();
    tr1.appendChild(th);
  });

  table.appendChild(tr1);

  // fila días
  let tr2 = document.createElement("tr");
  tr2.innerHTML = "<th></th><th></th>";

  dates.forEach(d=>{
    let th = document.createElement("th");
    th.innerText = new Date(d).getDate();
    tr2.appendChild(th);
  });

  table.appendChild(tr2);

  // estudiantes
  STUDENTS.forEach((name,i)=>{
    let tr = document.createElement("tr");

    tr.innerHTML = `
      <td class="num">${i+1}</td>
      <td class="name">${name}</td>
    `;

    dates.forEach(d=>{
      let td = document.createElement("td");

      let val = data[i]?.[d] || "";

      td.innerHTML = `
        <select class="s-${val}" onchange="setVal(this,${i},'${d}')">
          <option value=""></option>
          <option value="A" ${val==="A"?"selected":""}>A</option>
          <option value="F" ${val==="F"?"selected":""}>F</option>
          <option value="T" ${val==="T"?"selected":""}>T</option>
          <option value="E" ${val==="E"?"selected":""}>E</option>
        </select>
      `;

      tr.appendChild(td);
    });

    table.appendChild(tr);
  });

  container.innerHTML="";
  container.appendChild(table);
}

function setVal(sel,i,d){
  if(!data[i]) data[i]={};
  data[i][d]=sel.value;

  sel.className = "s-"+sel.value;
}

function addMonth(){
  let last = new Date(dates[dates.length-1]);

  last.setDate(last.getDate()+3);

  let newDates = generateDates(format(last),4);

  dates = dates.concat(newDates);

  render();
}

render();

</script>

</body>
</html>
