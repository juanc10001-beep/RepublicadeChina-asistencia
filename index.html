<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Asistencia 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Variables ─────────────────────────────────────────── */
:root {
  --navy-950:#07213e;
  --navy-900:#0d2f5f;
  --navy-800:#164f96;
  --navy-700:#1d65b8;
  --navy-600:#2578d5;
  --blue-100:#dbeafe;
  --blue-50:#eff6ff;
  --surface:#ffffff;
  --surface-2:#f5f8fd;
  --surface-3:#eef3fa;
  --text:#0f2540;
  --text-2:#2a4a6e;
  --muted:#607897;
  --muted-2:#9eb3cc;
  --border:#d5e3f0;
  --border-2:#c0d4e8;
  --shadow-sm:0 1px 4px rgba(10,35,74,.08);
  --shadow:0 4px 20px rgba(10,35,74,.10);
  --shadow-lg:0 12px 40px rgba(10,35,74,.15);
  --success:#15803d;
  --success-bg:#f0fdf4;
  --success-b:#bbf7d0;
  --danger:#dc2626;
  --danger-bg:#fef2f2;
  --danger-b:#fecaca;
  --warning:#c2410c;
  --warning-bg:#fff7ed;
  --warning-b:#fed7aa;
  --info:#1d4ed8;
  --info-bg:#eff6ff;
  --info-b:#bfdbfe;
  --purple:#7c3aed;
  --purple-bg:#faf5ff;
  --purple-b:#ddd6fe;
  --r:16px;
  --r-sm:10px;
  --r-lg:22px;
  --sidebar-w:290px;
  --topnav-h:56px;
  --schoolbar-h:64px;
}

/* ─── Reset & base ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;font-size:15px}
body{
  height:100%;
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  color:var(--text);
  background:#e8f0fa;
  overflow:hidden;
}

/* ─── Layout shell ──────────────────────────────────────── */
.shell{display:flex;height:100vh;overflow:hidden;position:relative}

/* ─── Sidebar ───────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:linear-gradient(175deg,var(--navy-900) 0%,var(--navy-950) 100%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border-right:1px solid rgba(255,255,255,.07);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:30;
}
.sidebar-top{padding:20px 16px 14px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.brand-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--navy-700),var(--navy-600));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 12px rgba(21,100,200,.4);
}
.brand-icon svg{width:22px;height:22px;fill:#fff}
.brand-text h1{font-size:17px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-.3px}
.brand-text p{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px;font-family:'JetBrains Mono',monospace}
.search-wrap{position:relative}
.search-wrap input{
  width:100%;padding:11px 12px 11px 40px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:12px;
  background:rgba(255,255,255,.08);
  color:#fff;font-size:13.5px;
  font-family:inherit;outline:none;
  transition:background .2s,border-color .2s;
}
.search-wrap input:focus{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.22)}
.search-wrap input::placeholder{color:rgba(255,255,255,.45)}
.search-wrap .ico{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;fill:rgba(255,255,255,.5);pointer-events:none;
}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 10px 16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}
.grade-label{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;
  color:rgba(255,255,255,.38);padding:14px 6px 5px;font-weight:700;
}
.course-btn{
  width:100%;border:none;border-radius:11px;
  background:transparent;color:rgba(255,255,255,.78);
  display:flex;align-items:center;gap:9px;
  padding:10px 10px 10px 12px;
  cursor:pointer;text-align:left;font-size:13.5px;font-weight:500;
  font-family:inherit;transition:all .15s ease;margin-bottom:3px;
}
.course-btn:hover{background:rgba(255,255,255,.08);color:#fff}
.course-btn.active{background:#fff;color:var(--navy-900);font-weight:700;box-shadow:var(--shadow)}
.c-pill{
  margin-left:auto;font-size:11.5px;font-family:'JetBrains Mono',monospace;
  padding:2px 8px;border-radius:999px;
  background:rgba(255,255,255,.10);color:rgba(255,255,255,.6);
}
.course-btn.active .c-pill{background:var(--blue-50);color:var(--navy-800)}

/* ─── Main area ─────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Top bar */
.topbar{
  height:var(--topnav-h);flex-shrink:0;
  background:#fff;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:0 20px;
  box-shadow:var(--shadow-sm);
  z-index:10;
}
.menu-btn{
  display:none;width:38px;height:38px;border:none;background:var(--surface-2);
  border-radius:10px;cursor:pointer;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--text-2);transition:background .15s;
}
.menu-btn:hover{background:var(--surface-3)}
.menu-btn svg{width:20px;height:20px;fill:currentColor}
.topbar-title{flex:1;min-width:0}
.topbar-title h2{font-size:17px;font-weight:800;color:var(--navy-900);letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-title p{font-size:12px;color:var(--muted);display:none}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.chip{
  font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:500;
  padding:5px 11px;border-radius:999px;
  background:var(--blue-50);color:var(--navy-800);
  border:1px solid var(--blue-100);white-space:nowrap;
}

/* Tabs */
.tabs-bar{
  display:flex;align-items:center;gap:2px;
  padding:0 20px;
  background:#fff;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.tab-btn{
  display:flex;align-items:center;gap:6px;
  padding:12px 16px;
  border:none;border-bottom:2px solid transparent;
  background:transparent;cursor:pointer;
  font-family:inherit;font-size:13.5px;font-weight:600;color:var(--muted);
  transition:all .18s;margin-bottom:-1px;
  border-radius:0;
  white-space:nowrap;
}
.tab-btn svg{width:15px;height:15px;fill:currentColor;opacity:.7}
.tab-btn:hover{color:var(--navy-800)}
.tab-btn.active{color:var(--navy-800);border-bottom-color:var(--navy-700)}
.tab-btn.active svg{opacity:1}

/* Action bar */
.action-bar{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:12px 20px;
  background:var(--surface-2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;
}
.action-bar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.action-bar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.legend{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.leg-item{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11.5px;color:var(--muted);
  padding:4px 10px;border-radius:999px;
  background:#fff;border:1px solid var(--border);
}
.dot{width:8px;height:8px;border-radius:50%}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  border:none;cursor:pointer;font-family:inherit;font-weight:600;
  border-radius:10px;padding:9px 15px;font-size:13.5px;
  transition:all .18s;white-space:nowrap;
}
.btn svg{width:15px;height:15px;fill:currentColor}
.btn-primary{background:var(--navy-800);color:#fff;box-shadow:0 2px 8px rgba(22,79,150,.3)}
.btn-primary:hover{background:var(--navy-700)}
.btn-success{background:var(--success);color:#fff;box-shadow:0 2px 8px rgba(21,128,61,.25)}
.btn-success:hover{background:#166534}
.btn-ghost{background:#fff;color:var(--text-2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface-2);border-color:var(--border-2)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-b)}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:8px}

/* ─── Content scroll area ──────────────────────────────── */
.content-area{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;min-height:0}

/* ─── Empty / no-selection state ───────────────────────── */
.empty-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);
  min-height:300px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;text-align:center;padding:40px;
  box-shadow:var(--shadow-sm);
}
.empty-icon{
  width:64px;height:64px;border-radius:18px;
  background:var(--surface-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
}
.empty-icon svg{width:30px;height:30px;fill:var(--muted-2)}
.empty-card h3{font-size:19px;font-weight:800;color:var(--navy-900)}
.empty-card p{font-size:14px;color:var(--muted);max-width:340px;line-height:1.6}

/* ─── Table card ─────────────────────────────────────────  */
.table-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;box-shadow:var(--shadow);flex-shrink:0;
}
.table-zone{overflow:auto;max-height:calc(100vh - 290px)}
table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:13px}

/* Sticky header */
thead th{
  position:sticky;top:0;z-index:6;
  background:#e8f0fa;color:var(--text-2);
  font-weight:700;border-bottom:1px solid var(--border-2);
}
thead tr:first-child th{
  padding:10px 8px;font-size:11px;text-transform:uppercase;
  letter-spacing:.09em;background:#deeaf8;
}
thead tr:nth-child(2) th{
  padding:8px 4px;font-size:10.5px;background:#e8f0fa;
}

/* Sticky columns */
.col-num,.col-name{
  position:sticky;z-index:5;background:#f5f8fd;
}
.col-num{left:0;z-index:7;width:44px;min-width:44px;text-align:center;font-weight:700;color:var(--muted)}
.col-name{left:44px;z-index:7;min-width:170px;max-width:220px;text-align:left;padding:0 10px;font-weight:600;color:var(--text-2);background:#fff}
thead .col-num,thead .col-name{background:#deeaf8;z-index:9}
thead .col-name{background:#deeaf8}

/* Day columns */
.day-head{min-width:160px}
.day-wrap{display:grid;grid-template-columns:1fr 1fr}
.subhead{
  padding:5px 3px;font-size:10px;font-weight:700;color:var(--muted);
  border-top:1px solid var(--border);
}
.subhead+.subhead{border-left:1px solid var(--border)}
.month-sep{box-shadow:inset 3px 0 0 var(--border-2)}
tbody td{
  height:44px;border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:0;text-align:center;background:#fff;
}
tbody tr:hover td{background:#f9fbff}
tbody tr:hover .col-num{background:#eef5fb}
tbody tr:hover .col-name{background:#f4f8fd}
tbody td.col-num{padding:0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px}
tbody td.col-name{height:auto;padding:8px 10px;font-size:12.5px}

/* Selects inside cells */
.cell-sel{
  width:calc(100% - 4px);
  border:1px solid var(--border);background:#fff;
  border-radius:6px;padding:5px 4px;font-size:11px;
  font-weight:600;outline:none;color:var(--text-2);
  cursor:pointer;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;margin:2px;
}
.cell-sel:focus{border-color:#93b8e8;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.cell-sel.a-asiste{background:var(--success-bg);color:var(--success);border-color:var(--success-b)}
.cell-sel.a-no-asiste{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-b)}
.cell-sel.a-tarde{background:var(--warning-bg);color:var(--warning);border-color:var(--warning-b)}
.cell-sel.a-excusa{background:var(--info-bg);color:var(--info);border-color:var(--info-b)}
.cell-sel.u-inadecuado{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-b)}
.cell-sel.u-permiso-coordinacion{background:#eef2ff;color:#4338ca;border-color:#c7d2fe}
@media(max-width:640px){.day-head{min-width:120px}.cell-sel{font-size:10px;padding:4px 3px}}

/* Table footer */
.table-foot{
  padding:10px 16px;background:var(--surface-2);
  color:var(--muted);font-size:12px;border-top:1px solid var(--border);
}

/* Stats pct badge */
.att-pct{
  font-size:11px;font-weight:700;padding:2px 7px;
  border-radius:999px;font-family:'JetBrains Mono',monospace;
}
.pct-hi{background:#dcfce7;color:#15803d}
.pct-mid{background:#fef9c3;color:#a16207}
.pct-lo{background:#fee2e2;color:#b91c1c}

/* ─── School header bar ──────────────────────────────────── */
.school-bar{
  flex-shrink:0;
  background:linear-gradient(90deg,var(--navy-950) 0%,var(--navy-800) 100%);
  display:flex;align-items:center;gap:11px;
  padding:8px 16px;
  box-shadow:0 2px 8px rgba(7,33,62,.35);
  position:relative;z-index:25;
}
.school-shield{
  width:44px;height:44px;border-radius:50%;
  object-fit:cover;flex-shrink:0;
  border:2px solid rgba(255,255,255,.3);
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.school-titles{flex:1;min-width:0}
.school-titles .s-name{
  font-size:12.5px;font-weight:800;color:#fff;
  letter-spacing:.01em;line-height:1.25;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.school-titles .s-sub{
  font-size:10.5px;color:rgba(255,255,255,.62);
  font-family:'JetBrains Mono',monospace;margin-top:2px;
  white-space:nowrap;
}
@media(max-width:640px){
  .school-bar{padding:6px 10px;gap:8px}
  .school-shield{width:34px;height:34px}
  .school-titles .s-name{font-size:11px}
  .school-titles .s-sub{font-size:9.5px}
}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.stat-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;box-shadow:var(--shadow-sm);
}
.stat-card .label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.stat-card .value{font-size:28px;font-weight:800;letter-spacing:-.5px;font-family:'JetBrains Mono',monospace}
.stat-card .sub{font-size:12px;color:var(--muted);margin-top:3px}
.val-green{color:var(--success)}
.val-red{color:var(--danger)}
.val-blue{color:var(--navy-800)}
.val-amber{color:var(--warning)}
.val-purple{color:var(--purple)}

.section-title{
  font-size:16px;font-weight:800;color:var(--navy-900);
  letter-spacing:-.3px;margin-bottom:10px;margin-top:4px;
}
.course-stat-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;box-shadow:var(--shadow-sm);
}
.csc-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:var(--surface-2);border-bottom:1px solid var(--border);
}
.csc-header .name{font-size:14px;font-weight:700;color:var(--navy-900)}
.csc-header .meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.csc-bars{padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-row .blabel{font-size:12px;color:var(--muted);width:90px;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--surface-3);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-row .bval{font-size:12px;font-weight:700;width:44px;text-align:right;font-family:'JetBrains Mono',monospace}

/* ─── Modal ──────────────────────────────────────────────── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(7,33,62,.55);
  backdrop-filter:blur(6px);z-index:100;
  align-items:center;justify-content:center;padding:20px;
}
.modal-bg.open{display:flex}
.modal{
  background:#fff;border-radius:20px;width:100%;max-width:460px;
  box-shadow:var(--shadow-lg);overflow:hidden;
  animation:modalIn .22s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(12px)}to{opacity:1;transform:none}}
.modal-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px 16px;border-bottom:1px solid var(--border);
}
.modal-head h3{font-size:18px;font-weight:800;color:var(--navy-900);letter-spacing:-.3px}
.modal-close{
  width:34px;height:34px;border:none;background:var(--surface-3);
  border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:background .15s;
}
.modal-close:hover{background:var(--border);color:var(--text)}
.modal-close svg{width:16px;height:16px;fill:currentColor}
.modal-body{padding:22px 24px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.form-input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:10px;font-family:inherit;font-size:14px;color:var(--text);
  outline:none;transition:border-color .18s,box-shadow .18s;
  background:#fff;
}
.form-input:focus{border-color:#8ab4e3;box-shadow:0 0 0 3.5px rgba(37,99,235,.12)}
.form-input::placeholder{color:var(--muted-2)}
.form-hint{font-size:12px;color:var(--muted);margin-top:5px}
.modal-foot{
  display:flex;justify-content:flex-end;gap:10px;
  padding:14px 24px 20px;border-top:1px solid var(--border);background:var(--surface-2);
}

/* ─── Sidebar overlay (mobile) ───────────────────────────── */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(7,33,62,.5);
  z-index:29;backdrop-filter:blur(2px);
}

/* ─── Responsive ─────────────────────────────────────────── */
@media(max-width:1024px){
  .shell{flex-direction:column;overflow:auto;height:auto;min-height:100vh}
  body{overflow:auto}
  .sidebar{
    position:fixed;left:0;top:0;bottom:0;
    transform:translateX(-110%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow:var(--shadow-lg);
    height:100vh;
  }
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .main{flex:1;min-height:100vh;overflow:visible}
  .school-bar{position:sticky;top:0;z-index:22}
  .topbar{position:sticky;top:62px;z-index:21}
  .tabs-bar{position:sticky;top:calc(62px + var(--topnav-h));z-index:20;overflow-x:auto}
  .action-bar{position:sticky;top:calc(62px + var(--topnav-h) + 45px);z-index:19}
  .menu-btn{display:inline-flex}
  .content-area{max-height:none;overflow:visible;padding:12px}
  .table-zone{max-height:none;overflow:auto;-webkit-overflow-scrolling:touch}
}
@media(max-width:640px){
  :root{--sidebar-w:88vw;--topnav-h:50px}
  .school-bar{top:0}
  .topbar{top:52px}
  .tabs-bar{top:calc(52px + 50px)}
  .action-bar{top:calc(52px + 50px + 43px)}
  .content-area{padding:8px}
  .action-bar{flex-direction:column;align-items:stretch;gap:8px;padding:8px 10px}
  .action-bar-left,.action-bar-right{justify-content:center}
  .legend{justify-content:center}
  .stats-grid{grid-template-columns:1fr 1fr}
  .tab-btn{padding:9px 10px;font-size:12px;gap:4px}
  .tab-btn span{display:none}
  .topbar-title h2{font-size:14px}
  .chip{font-size:11px;padding:3px 8px}
  .col-name{min-width:130px;max-width:160px}
}
@media(max-width:360px){
  .stats-grid{grid-template-columns:1fr}
  .col-name{min-width:110px;max-width:140px}
}
</style>
</head>
<body>

<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="shell">

  <!-- ─── Sidebar ─── -->

function weekdaysOfMonth(ms, startDay=1) {
  const [year,month] = ms.split("-").map(Number);
  const days = new Date(year,month,0).getDate();
  const res = [];
  for (let day=startDay; day<=days; day++) {
    const d = new Date(year,month-1,day);
    const dow = d.getDay();
    const code = iso(d);
    if (dow!==0 && dow!==6 && !HOLIDAYS.has(code)) res.push(code);
  }
  return res;
}

function groupByMonth(dates) {
  const groups = [];
  dates.forEach((ds,i) => {
    const d = new Date(ds+"T00:00:00");
    const label = `${MONTHS_ES[d.getMonth()]} ${d.getFullYear()}`;
    const last = groups[groups.length-1];
    if (!last || last.label!==label) groups.push({label,count:1,startIndex:i});
    else last.count++;
  });
  return groups;
}

function fmtDay(ds) {
  const d = new Date(ds+"T00:00:00");
  return `${p(d.getDate())}/${p(d.getMonth()+1)}`;
}

/* ══════════════════════════════════════════════════════════
   COURSE INIT
══════════════════════════════════════════════════════════ */
function initCourse(id) {
  if (!sts[id]) sts[id] = JSON.parse(JSON.stringify(STUDENTS[id] || []));
  if (!store[id]) store[id] = {};
  if (!mState[id]) {
    mState[id] = {
      months: [START_DATE],
      dates: weekdaysOfMonth(START_DATE, START_DAY)
    };
  }
}

function getDates(id) { initCourse(id); return mState[id].dates; }

function getRec(id, num, ds) {
  if (!store[id]) store[id] = {};
  if (!store[id][num]) store[id][num] = {};
  if (!store[id][num][ds]) store[id][num][ds] = {a:"",u:""};
  return store[id][num][ds];
}

/* ══════════════════════════════════════════════════════════
   STUDENT STATS
══════════════════════════════════════════════════════════ */
function calcStudentStats(cid, snum) {
  const dates = getDates(cid);
  let a=0, n=0, t=0, e=0, u=0;
  dates.forEach(ds => {
    const r = store[cid]?.[snum]?.[ds] || {};
    if (r.a==="asiste") a++;
    else if (r.a==="no-asiste") n++;
    else if (r.a==="tarde") t++;
    else if (r.a==="excusa") e++;
    if (r.u) u++;
  });
  const total = dates.length;
  const pct = total > 0 ? Math.round(a / total * 100) : 0;
  return {a,n,t,e,u,total,pct};
}

function calcCourseStats(cid) {
  initCourse(cid);
  const students = sts[cid] || [];
  const total = {a:0,n:0,t:0,e:0,u:0,days:0};
  students.forEach(s => {
    const st = calcStudentStats(cid, s.num);
    total.a += st.a; total.n += st.n;
    total.t += st.t; total.e += st.e; total.u += st.u;
    total.days = st.total;
  });
  const allMarked = total.a + total.n + total.t + total.e;
  const pct = allMarked > 0 ? Math.round(total.a / allMarked * 100) : 0;
  return {...total, students:students.length, pct};
}

/* ══════════════════════════════════════════════════════════
   API
══════════════════════════════════════════════════════════ */
function apiPost(obj) {
  return fetch(API_URL, {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded;charset=UTF-8"},
    body:"payload="+encodeURIComponent(JSON.stringify(obj)),
    cache:"no-store"
  }).then(r=>r.json());
}
function apiGet(params) {
  return fetch(`${API_URL}?${new URLSearchParams({...params,_:Date.now()})}&cache=no-store`)
    .then(r=>r.json());
}

async function syncStudents(id) {
  return apiPost({action:"syncStudents",curso:id,students:sts[id].map(s=>({num:s.num,name:s.name}))});
}

function applyRemote(id, data) {
  if (!data?.headers || !data?.rows) return;
  const numIdx = data.headers.indexOf("N°");
  const nameIdx = data.headers.indexOf("ESTUDIANTE");
  if (numIdx<0 || nameIdx<0) return;
  data.rows.forEach(row => {
    const num = Number(row[numIdx]||0);
    const name = String(row[nameIdx]||"").trim().toUpperCase();
    const s = sts[id].find(x => Number(x.num)===num || x.name.trim().toUpperCase()===name);
    if (!s) return;
    if (!store[id][s.num]) store[id][s.num] = {};
    data.headers.forEach((h,i) => {
      if (i<2) return;
      const v = String(row[i]||"").trim();
      if (!v) return;
      if (h.endsWith("_ASIST")) {
        const ds = h.replace("_ASIST","");
        if (!store[id][s.num][ds]) store[id][s.num][ds]={a:"",u:""};
        store[id][s.num][ds].a = v;
      }
      if (h.endsWith("_UNIF")) {
        const ds = h.replace("_UNIF","");
        if (!store[id][s.num][ds]) store[id][s.num][ds]={a:"",u:""};
        store[id][s.num][ds].u = v;
      }
    });
  });
}

/* ══════════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════════ */
function renderSidebar() {
  const q = (document.getElementById("courseSearch").value||"").toLowerCase();
  const list = document.getElementById("coursesList");
  list.innerHTML = "";
  const byGrade = {};
  Object.keys(STUDENTS).filter(c => c.includes(q) || `curso ${c}`.includes(q)).sort()
    .forEach(c => {
      const g = c.replace(/\d+$/,"");
      if (!byGrade[g]) byGrade[g] = [];
      byGrade[g].push(c);
    });
  Object.keys(byGrade).sort().forEach(g => {
    const lbl = document.createElement("div");
    lbl.className = "grade-label";
    lbl.textContent = `Grado ${g}`;
    list.appendChild(lbl);
    byGrade[g].forEach(c => {
      const btn = document.createElement("button");
      btn.className = "course-btn" + (cur===c?" active":"");
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;flex-shrink:0"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg><span>Curso ${c}</span><span class="c-pill">${(STUDENTS[c]||[]).length}</span>`;
      btn.onclick = () => selectCourse(c);
      list.appendChild(btn);
    });
  });
}

/* ══════════════════════════════════════════════════════════
   SELECT COURSE
══════════════════════════════════════════════════════════ */
async function selectCourse(id) {
  cur = id; initCourse(id);
  document.getElementById("courseHeader").textContent = `Curso ${id}`;
  document.getElementById("studentChip").textContent = `${sts[id].length} estudiantes`;
  document.getElementById("studentChip").style.display = "";
  document.getElementById("actionBar").style.display = "";
  renderSidebar();
  renderTab();
  if (window.innerWidth<=1024) closeSidebar();
  if (!remLoaded[id]) {
    try {
      const data = await apiGet({action:"getCourse",curso:id});
      if (data?.ok) { applyRemote(id,data); renderTab(); }
      await syncStudents(id);
    } catch(err) { console.error(err); }
    remLoaded[id] = true;
  }
}

function renderAttendance() {
  const area = document.getElementById("contentArea");
  if (!cur) {
    area.innerHTML = `<div class="empty-card"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg></div><h3>Selecciona un curso</h3><p>Elige un curso del panel izquierdo para registrar asistencia.</p></div>`;
    return;
  }
  area.innerHTML = "";
  area.appendChild(buildAttTable(cur));
}

function buildAttTable(cid) {
  const dates = getDates(cid);
  const monthGroups = groupByMonth(dates);
  const wrap = document.createElement("div"); wrap.className="table-card";
  const zone = document.createElement("div"); zone.className="table-zone";
  const table = document.createElement("table");
  const thead = document.createElement("thead");

  // Row 1: month headers
  const r1 = document.createElement("tr");
  r1.innerHTML = `<th class="col-num" rowspan="2">#</th><th class="col-name" rowspan="2" style="text-align:left;padding:0 12px">Estudiante</th>`;
  monthGroups.forEach((g,gi) => {
    const th = document.createElement("th");
    th.colSpan = g.count * 2;
    th.textContent = g.label;
    if (gi>0) th.classList.add("month-sep");
    r1.appendChild(th);
  });
  // Totals column header
  const totTh = document.createElement("th");
  totTh.rowSpan = 2; totTh.className = "col-tot";
  totTh.style.cssText = "text-align:center;font-size:11px;letter-spacing:.08em";
  totTh.textContent = "TOTALES";
  r1.appendChild(totTh);
  thead.appendChild(r1);

  // Row 2: day headers
  const r2 = document.createElement("tr");
  dates.forEach((ds,idx) => {
    const th = document.createElement("th");
    th.className = "day-head" + (idx>0 && new Date(ds+"T00:00:00").getDate()===1 ? " month-sep" : "");
    th.colSpan = 2;
    th.innerHTML = `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 0">${fmtDay(ds)}</div><div class="day-wrap"><div class="subhead">Asistencia</div><div class="subhead">Uniforme</div></div>`;
    r2.appendChild(th);
  });
  thead.appendChild(r2);
  table.appendChild(thead);

  // Body
  const tbody = document.createElement("tbody");
  sts[cid].forEach(s => {
    const tr = document.createElement("tr");
    const numTd = document.createElement("td"); numTd.className="col-num"; numTd.textContent=s.num;
    const nameTd = document.createElement("td"); nameTd.className="col-name"; nameTd.textContent=s.name;
    tr.appendChild(numTd); tr.appendChild(nameTd);

    dates.forEach(ds => {
      const rec = getRec(cid,s.num,ds);
      const att = document.createElement("td");
      const uni = document.createElement("td");

      const asel = document.createElement("select"); asel.className="cell-sel";
      asel.innerHTML=`<option value="">—</option><option value="asiste">Asiste</option><option value="no-asiste">No asiste</option><option value="tarde">Tarde</option><option value="excusa">Excusa</option>`;
      asel.value = rec.a||""; applySelClass(asel,"a");
      asel.onchange = () => saveField(cid,s,ds,"a",asel);

      const usel = document.createElement("select"); usel.className="cell-sel";
      usel.innerHTML=`<option value="">—</option><option value="inadecuado">Inadecuado</option><option value="permiso-coordinacion">Permiso coord.</option>`;
      usel.value = rec.u||""; applySelClass(usel,"u");
      usel.onchange = () => saveField(cid,s,ds,"u",usel);

      att.appendChild(asel); uni.appendChild(usel);
      tr.appendChild(att); tr.appendChild(uni);
    });

    // Totals cell
    const totTd = document.createElement("td");
    totTd.className = "col-tot";
    totTd.id = `tot-${cid}-${s.num}`;
    renderTotCell(totTd, cid, s.num);
    tr.appendChild(totTd);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  zone.appendChild(table); wrap.appendChild(zone);
  const foot = document.createElement("div"); foot.className="table-foot";
  foot.textContent = `Mostrando ${dates.length} día(s) hábil(es) en ${mState[cid].months.length} mes(es). Use "+ Mes" para ampliar el período.`;
  wrap.appendChild(foot);
  return wrap;
}

function renderTotCell(td, cid, snum) {
  const st = calcStudentStats(cid, snum);
  const pctClass = st.pct>=90?"pct-hi":st.pct>=75?"pct-mid":"pct-lo";
  td.innerHTML = `<div class="tot-grid">
    ${st.a?`<span class="tot-badge tot-a"><span class="dot" style="background:#15803d"></span>${st.a}A</span>`:""}
    ${st.n?`<span class="tot-badge tot-n"><span class="dot" style="background:#dc2626"></span>${st.n}F</span>`:""}
    ${st.t?`<span class="tot-badge tot-t"><span class="dot" style="background:#c2410c"></span>${st.t}T</span>`:""}
    ${st.e?`<span class="tot-badge tot-e"><span class="dot" style="background:#1d4ed8"></span>${st.e}E</span>`:""}
    ${st.u?`<span class="tot-badge tot-u"><span class="dot" style="background:#7c3aed"></span>${st.u}U</span>`:""}
    ${st.total>0?`<span class="att-pct ${pctClass}">${st.pct}%</span>`:""}
  </div>`;
}

function applySelClass(sel, type) {
  sel.className = "cell-sel";
  if (!sel.value) return;
  if (type==="a") sel.classList.add(`a-${sel.value}`);
  else sel.classList.add(`u-${sel.value}`);
}

async function saveField(cid, student, ds, field, sel) {
  const rec = getRec(cid, student.num, ds);
  rec[field] = sel.value;
  applySelClass(sel, field);
  // Update totals
  const totEl = document.getElementById(`tot-${cid}-${student.num}`);
  if (totEl) renderTotCell(totEl, cid, student.num);
  try {
    const payload = {action:"saveRecord",curso:cid,studentNum:student.num,studentName:student.name,fecha:ds};
    if (field==="a") payload.asistencia=sel.value;
    else payload.uniforme=sel.value;
    await apiPost(payload);
  } catch(err) { console.error(err); }
}

function openAddStudentModal() {
  document.getElementById("newStudentName").value = "";
  document.getElementById("modalAdd").classList.add("open");
  setTimeout(()=>document.getElementById("newStudentName").focus(),80);

function confirmAddStudent() {
  const name = document.getElementById("newStudentName").value.trim().toUpperCase();
  if (!name || !cur) return;
  const ss = sts[cur];
  const exists = ss.find(s=>s.name.toUpperCase()===name);
  if (exists) { alert("Este estudiante ya está registrado."); return; }
  const maxNum = ss.reduce((m,s)=>Math.max(m,Number(s.num)),0);
  ss.push({num:maxNum+1, name});
  ss.sort((a,b)=>a.name.localeCompare(b.name,"es"));
  ss.forEach((s,i)=>s.num=i+1);
  document.getElementById("studentChip").textContent = `${ss.length} estudiantes`;
  closeModal("modalAdd");
  renderTab();
  // sync to sheets
  syncStudents(cur).catch(console.error);
}

/* ══════════════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════════════ */
function addMonth() {
  if (!cur) return;
  const ms = mState[cur];
  const last = ms.months[ms.months.length-1];
  const next = nextMonthStr(last);
  ms.months.push(next);
  ms.dates = ms.dates.concat(weekdaysOfMonth(next));
  renderTab();
}

function exportCSV() {
  if (!cur) return;
  const dates = getDates(cur);
  let csv = "\uFEFF";
  csv += `Curso ${cur}\n`;
  csv += `N°,Estudiante`;
  dates.forEach(d => { csv += `,${d} Asistencia,${d} Uniforme`; });
  csv += `,Total Asiste,Total NoAsiste,Total Tarde,Total Excusa,Total Uniforme,% Asistencia\n`;
  sts[cur].forEach(s => {
    const st = calcStudentStats(cur, s.num);
    csv += `${s.num},"${s.name}"`;
    dates.forEach(d => {
      const r = getRec(cur,s.num,d);
      csv += `,${r.a||""},${r.u||""}`;
    });
    csv += `,${st.a},${st.n},${st.t},${st.e},${st.u},${st.pct}%\n`;
  });
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `asistencia_${cur}.csv`;
  a.click();
}

/* ══════════════════════════════════════════════════════════
   MODAL & SIDEBAR HELPERS
══════════════════════════════════════════════════════════ */
function openModal(id) { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("open");
}

/* ══════════════════════════════════════════════════════════
   EVENT WIRING
══════════════════════════════════════════════════════════ */
document.getElementById("courseSearch").addEventListener("input", renderSidebar);
document.getElementById("menuBtn").addEventListener("click", () => {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
});
document.getElementById("modalAdd").addEventListener("click", function(e){
  if (e.target===this) closeModal("modalAdd");
});

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
renderSidebar();
</script>
