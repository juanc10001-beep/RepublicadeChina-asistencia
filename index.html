<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma de Asistencia · 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --surface3: #252d3f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #55607a;
    --accent: #4f8ef7;
    --accent-soft: rgba(79,142,247,0.12);
    --accent-border: rgba(79,142,247,0.3);
    --green: #3ecf8e;
    --green-soft: rgba(62,207,142,0.1);
    --red: #f16565;
    --red-soft: rgba(241,101,101,0.1);
    --amber: #f5a623;
    --amber-soft: rgba(245,166,35,0.1);
    --blue-soft: rgba(79,142,247,0.1);
    --radius: 10px;
    --radius-lg: 14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; overflow: hidden; }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 240px; min-width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); }
  .logo-mark { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-icon svg { width: 18px; height: 18px; fill: white; }
  .logo-text { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-left: 42px; letter-spacing: 0.05em; }
  .sidebar-search-wrap { padding: 12px 12px 8px; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 7px 11px; }
  .search-box svg { width: 14px; height: 14px; fill: var(--text3); flex-shrink: 0; }
  .search-box input { background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; width: 100%; }
  .search-box input::placeholder { color: var(--text3); }
  .courses-scroll { flex: 1; overflow-y: auto; padding: 0 8px 16px; scrollbar-width: thin; scrollbar-color: var(--surface3) transparent; }
  .grade-label { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'DM Mono', monospace; padding: 14px 8px 5px; }
  .course-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 10px; border-radius: 8px; border: none; background: none; color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-align: left; transition: background 0.15s, color 0.15s; }
  .course-btn:hover { background: var(--surface2); color: var(--text); }
  .course-btn.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
  .course-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .course-btn.active .course-dot { background: var(--accent); }
  .course-count { margin-left: auto; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); background: var(--surface3); padding: 1px 6px; border-radius: 4px; }
  .course-btn.active .course-count { background: var(--accent-soft); color: var(--accent); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; min-height: 60px; }
  .topbar-left { flex: 1; display: flex; align-items: center; gap: 12px; }
  .course-name-header { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .student-chip { font-size: 11px; color: var(--text3); background: var(--surface3); padding: 2px 8px; border-radius: 5px; font-family: 'DM Mono', monospace; }
  .topbar-actions { display: flex; gap: 8px; }
  .btn { display: flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--surface3); color: var(--text); }
  .btn svg { width: 14px; height: 14px; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: #3a7de8; border-color: #3a7de8; color: white; }
  .btn-green { background: var(--green-soft); border-color: rgba(62,207,142,0.25); color: var(--green); }
  .btn-green:hover { background: rgba(62,207,142,0.18); color: var(--green); }

  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--surface3) transparent; display: flex; flex-direction: column; gap: 16px; }

  /* Empty state */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: var(--text3); text-align: center; padding: 40px; }
  .empty-icon { width: 64px; height: 64px; background: var(--surface2); border: 1px solid var(--border); border-radius: 18px; display: flex; align-items: center; justify-content: center; }
  .empty-icon svg { width: 28px; height: 28px; fill: var(--text3); }
  .empty-state h3 { font-size: 16px; color: var(--text2); font-weight: 500; }
  .empty-state p { font-size: 13px; max-width: 260px; line-height: 1.6; }

  /* Week card */
  .week-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .week-header { display: flex; align-items: center; gap: 10px; padding: 13px 18px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .week-num { font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .week-month { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; }
  .week-range { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-left: auto; }

  /* Table */
  .table-scroll { overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--surface3) transparent; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead th { padding: 8px 10px; text-align: center; font-size: 11px; font-weight: 500; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--surface); }
  thead th.th-name { text-align: left; min-width: 36px; }
  thead th.th-student { text-align: left; min-width: 200px; }
  thead th.th-day { min-width: 175px; }
  .day-th-inner { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .day-name-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); font-family: 'DM Mono', monospace; }
  .date-picker { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 6px; cursor: pointer; outline: none; transition: border 0.15s; }
  .date-picker:focus { border-color: var(--accent); color: var(--text); }
  .col-labels { display: flex; gap: 4px; justify-content: center; margin-top: 2px; }
  .col-label { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--text3); letter-spacing: 0.04em; padding: 1px 5px; background: var(--surface3); border-radius: 3px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 6px 10px; text-align: center; vertical-align: middle; }
  td.td-num { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; width: 36px; text-align: center; }
  td.td-name { text-align: left; font-size: 12.5px; color: var(--text); font-weight: 400; letter-spacing: -0.1px; }
  .cell-pair { display: flex; flex-direction: column; gap: 3px; align-items: center; }
  select { font-family: 'DM Sans', sans-serif; font-size: 11.5px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); padding: 4px 6px; outline: none; cursor: pointer; transition: all 0.15s; width: 104px; }
  select:focus { border-color: var(--accent); }
  select.s-asiste { border-color: rgba(62,207,142,0.4); color: var(--green); background: var(--green-soft); }
  select.s-no-asiste { border-color: rgba(241,101,101,0.4); color: var(--red); background: var(--red-soft); }
  select.s-tarde { border-color: rgba(245,166,35,0.4); color: var(--amber); background: var(--amber-soft); }
  select.s-excusa { border-color: rgba(79,142,247,0.4); color: var(--accent); background: var(--blue-soft); }
  select.s-unif-bad { border-color: rgba(241,101,101,0.4); color: var(--red); background: var(--red-soft); }
  select.s-unif-exc { border-color: rgba(79,142,247,0.4); color: var(--accent); background: var(--blue-soft); }
  td.holiday-cell { background: rgba(245,166,35,0.04); vertical-align: middle; }
  .holiday-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; color: var(--amber); background: var(--amber-soft); border: 1px solid rgba(245,166,35,0.2); border-radius: 5px; padding: 3px 7px; font-family: 'DM Mono', monospace; }

  /* Stats bar */
  .stats-bar { display: flex; border-top: 1px solid var(--border); background: var(--surface2); overflow-x: auto; }
  .stat-item { display: flex; align-items: center; gap: 8px; padding: 10px 18px; border-right: 1px solid var(--border); white-space: nowrap; flex: 1; min-width: 0; }
  .stat-item:last-child { border-right: none; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .stat-label { font-size: 11px; color: var(--text3); }
  .stat-val { font-size: 14px; font-weight: 600; font-family: 'DM Mono', monospace; margin-left: auto; }

  /* Add week strip */
  .add-week-strip { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border: 1px dashed var(--border2); border-radius: var(--radius-lg); color: var(--text3); font-size: 13px; cursor: pointer; transition: all 0.15s; background: transparent; font-family: 'DM Sans', sans-serif; width: 100%; }
  .add-week-strip:hover { border-color: var(--accent-border); color: var(--accent); background: var(--accent-soft); }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 24px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); transform: translateY(8px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; letter-spacing: -0.3px; }
  .modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 12px; outline: none; transition: border 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>

          <span>Estudiante</span>

          <span>+ Mes</span>
        </button>
        <button class="btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 8h14v2H5z"/></svg>
          <span>Exportar CSV</span>
        </button>
      </div>
    </div>
    <div class="content" id="mainContent">
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
        </div>
        <h3>Ningún curso seleccionado</h3>
        <p>Elige un curso del panel izquierdo para comenzar a registrar asistencia.</p>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Agregar estudiante</div>
    <div class="modal-sub">El estudiante se ordenará alfabéticamente en la lista.</div>
    <label class="form-label">Nombre completo (apellidos + nombres)</label>
    <input class="form-input" id="newStudentName" type="text" placeholder="Ej: GARCIA LOPEZ MARIA JOSE"
      onkeydown="if(event.key==='Enter') confirmAdd()">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmAdd()">Agregar</button>
    </div>
  </div>
</div>

const API_URL = "https://script.google.com/macros/s/AKfycbxepm6bwpqYsYdIE1sUVFvsWUcldtS5NeK-mvX7A8WbtnmbsHjMHVdnOQG0ErW93thajA/exec";

const HOLIDAYS = new Set([
  '2026-01-01','2026-01-12','2026-03-23','2026-04-02','2026-04-03','2026-05-01',
  '2026-05-18','2026-06-08','2026-06-15','2026-06-29','2026-07-20','2026-08-07',
  '2026-08-17','2026-10-12','2026-11-02','2026-11-16','2026-12-08','2026-12-25'
]);

const START_DATE = '2026-04-13';
const END_DATE = '2026-11-30';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS = ['Lun','Mar','Mié','Jue','Vie'];

let cur = null;
let sts = {};
let wks = {};
let remoteLoaded = {};

function p(n) {
  return String(n).padStart(2, '0');
}

function iso(d) {
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function isHol(s) {
  return HOLIDAYS.has(s);
}

function wkDates(start) {
  const d = new Date(start + 'T00:00:00');
  const res = [];
  for (let i = 0; i < 5; i++) {
    const c = new Date(d);
    c.setDate(d.getDate() + i);
    res.push(iso(c));
  }
  return res;
}

function buildInitialWeeks() {
  const weeks = [];
  let cursor = new Date(START_DATE + 'T00:00:00');
  const end = new Date(END_DATE + 'T00:00:00');

  while (cursor <= end) {
    const start = iso(cursor);
    weeks.push({
      start,
      dates: wkDates(start),
      num: weeks.length + 1,
      month: MONTHS[new Date(start + 'T00:00:00').getMonth()],
      att: {}
    });
    cursor.setDate(cursor.getDate() + 7);
  }

  return weeks;
}

function initC(id) {
  if (!sts[id]) {
    sts[id] = JSON.parse(JSON.stringify(STUDENTS[id] || []));
  }

  if (!wks[id]) {
    wks[id] = buildInitialWeeks();
    wks[id].forEach(w => {
      sts[id].forEach(s => {
        if (!w.att[s.num]) w.att[s.num] = {};
        w.dates.forEach(d => {
          w.att[s.num][d] = { a:'', u:'' };
        });
      });
    });
  }
}

function ensureWeekStudentMap(courseId) {
  wks[courseId].forEach(w => {
    sts[courseId].forEach(s => {
      if (!w.att[s.num]) w.att[s.num] = {};
      w.dates.forEach(d => {
        if (!w.att[s.num][d]) w.att[s.num][d] = { a:'', u:'' };
      });
    });
  });
}

async function apiPost(obj) {
  const body = 'payload=' + encodeURIComponent(JSON.stringify(obj));
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
    },
    body
  });
  return await res.json();
}

async function apiGet(params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${API_URL}?${qs}`);
  return await res.json();
}

async function syncStudentsToSheet(courseId) {
  const students = (sts[courseId] || []).map(s => ({
    num: s.num,
    name: s.name
  }));

  return await apiPost({
    action: 'syncStudents',
    curso: courseId,
    students
  });
}

function applyRemoteData(courseId, data) {
  if (!data || !data.headers || !data.rows) return;

  const headers = data.headers;
  const rows = data.rows;
  const numIndex = headers.indexOf("N°");
  const nameIndex = headers.indexOf("ESTUDIANTE");

  if (numIndex === -1 || nameIndex === -1) return;

  rows.forEach(row => {
    const studentNum = Number(row[numIndex] || 0);
    const studentName = String(row[nameIndex] || "").trim();

    const localStudent = sts[courseId].find(s =>
      Number(s.num) === studentNum || String(s.name).trim() === studentName
    );

    if (!localStudent) return;

    headers.forEach((header, colIndex) => {
      if (colIndex < 2) return;
      const value = String(row[colIndex] || "").trim();
      if (!value) return;

      if (header.endsWith("_ASIST")) {
        const fecha = header.replace("_ASIST", "");
        const week = wks[courseId].find(w => w.dates.includes(fecha));
        if (week) {
          if (!week.att[localStudent.num]) week.att[localStudent.num] = {};
          if (!week.att[localStudent.num][fecha]) week.att[localStudent.num][fecha] = { a:'', u:'' };
          week.att[localStudent.num][fecha].a = value;
        }
      }

      if (header.endsWith("_UNIF")) {
        const fecha = header.replace("_UNIF", "");
        const week = wks[courseId].find(w => w.dates.includes(fecha));
        if (week) {
          if (!week.att[localStudent.num]) week.att[localStudent.num] = {};
          if (!week.att[localStudent.num][fecha]) week.att[localStudent.num][fecha] = { a:'', u:'' };
          week.att[localStudent.num][fecha].u = value;
        }
      }
    });
  });
}

async function loadCourseFromSheets(courseId) {
  const data = await apiGet({
    action: 'getCourse',
    curso: courseId
  });

  if (data && data.ok) {
    applyRemoteData(courseId, data);
  }
}

function renderSidebar() {
  const q = (document.getElementById('courseSearch').value || '').toLowerCase();
  const list = document.getElementById('coursesList');
  list.innerHTML = '';

  const graded = {};
  Object.keys(STUDENTS)
    .filter(c => c.includes(q) || ('curso ' + c).includes(q))
    .forEach(c => {
      const g = c.replace(/\d+$/, '');
      if (!graded[g]) graded[g] = [];
      graded[g].push(c);
    });

  Object.entries(graded).forEach(([g, cs]) => {
    const lbl = document.createElement('div');
    lbl.className = 'grade-label';
    lbl.textContent = `Grado ${g}`;
    list.appendChild(lbl);

    cs.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'course-btn' + (cur === c ? ' active' : '');
      btn.innerHTML = `<span class="course-dot"></span>Curso ${c}<span class="course-count">${(STUDENTS[c] || []).length}</span>`;
      btn.onclick = () => select(c);
      list.appendChild(btn);
    });
  });
}

async function select(id) {
  cur = id;
  initC(id);
  ensureWeekStudentMap(id);

  document.getElementById('courseHeader').textContent = `Curso ${id}`;
  document.getElementById('studentChip').textContent = `${sts[id].length} estudiantes`;
  document.getElementById('studentChip').style.display = '';
  document.getElementById('topbarActions').style.display = '';

  renderSidebar();

  if (!remoteLoaded[id]) {
    try {
      await syncStudentsToSheet(id);
      await loadCourseFromSheets(id);
    } catch (error) {
      console.error('Error cargando curso desde Google Sheets:', error);
    }
    remoteLoaded[id] = true;
  }

  render();
}

function render() {
  if (!cur) return;

  const content = document.getElementById('mainContent');
  content.innerHTML = '';

  wks[cur].forEach((w, wi) => content.appendChild(buildWeek(w, wi)));

  const addBtn = document.createElement('button');
  addBtn.className = 'add-week-strip';
  addBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> Agregar semana';
  addBtn.onclick = () => { addWk(cur); render(); };
  content.appendChild(addBtn);

  wks[cur].forEach((_, wi) => updateStats(wi));
}

function buildWeek(w, wi) {
  const card = document.createElement('div');
  card.className = 'week-card';

  const d0 = new Date(w.dates[0] + 'T00:00:00');
  const d4 = new Date(w.dates[4] + 'T00:00:00');

  card.innerHTML = `<div class="week-header">
    <span class="week-num">Semana ${w.num}</span>
    <span class="week-month">${w.month}</span>
    <span class="week-range">${p(d0.getDate())}/${p(d0.getMonth()+1)} — ${p(d4.getDate())}/${p(d4.getMonth()+1)}</span>
  </div>`;

  const scroll = document.createElement('div');
  scroll.className = 'table-scroll';

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  hr.innerHTML = '<th class="th-name">#</th><th class="th-student">Estudiante</th>';

  w.dates.forEach((d, di) => {
    const hol = isHol(d);
    const th = document.createElement('th');
    th.className = 'th-day';

    if (hol) th.style.background = 'rgba(245,166,35,0.05)';

    th.innerHTML = `<div class="day-th-inner">
      <span class="day-name-label">${DAYS[di]}</span>
      <input type="date" class="date-picker" value="${d}" ${hol ? 'disabled' : ''} onchange="changeDate(this,${wi},${di})">
      ${!hol ? '<div class="col-labels"><span class="col-label">Asist.</span><span class="col-label">Unif.</span></div>' : ''}
    </div>`;

    hr.appendChild(th);
  });

  thead.appendChild(hr);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  sts[cur].forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="td-num">${s.num}</td><td class="td-name">${s.name}</td>`;

    w.dates.forEach(d => {
      const td = document.createElement('td');

      if (isHol(d)) {
        td.className = 'holiday-cell';
        td.innerHTML = '<span class="holiday-tag">Festivo</span>';
      } else {
        const r = (w.att[s.num] && w.att[s.num][d]) || { a:'', u:'' };
        td.innerHTML = `<div class="cell-pair">
          <select class="s-${r.a}" onchange="setAtt(this,'${d}',${s.num},${wi},'a')">
            <option value="">— Asist.</option>
            <option value="asiste"${r.a === 'asiste' ? ' selected' : ''}>Asiste</option>
            <option value="no-asiste"${r.a === 'no-asiste' ? ' selected' : ''}>No asiste</option>
            <option value="tarde"${r.a === 'tarde' ? ' selected' : ''}>Llegó tarde</option>
            <option value="excusa"${r.a === 'excusa' ? ' selected' : ''}>Excusa</option>
          </select>
          <select class="s-unif-${r.u}" onchange="setAtt(this,'${d}',${s.num},${wi},'u')">
            <option value="">Uniforme ✓</option>
            <option value="bad"${r.u === 'bad' ? ' selected' : ''}>Inadecuado</option>
            <option value="exc"${r.u === 'exc' ? ' selected' : ''}>Excusa</option>
          </select>
        </div>`;
      }

      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  scroll.appendChild(table);
  card.appendChild(scroll);

  const stats = document.createElement('div');
  stats.className = 'stats-bar';
  stats.id = `stats-${wi}`;
  card.appendChild(stats);

  return card;
}

async function setAtt(sel, d, snum, wi, field) {
  const w = wks[cur][wi];
  if (!w.att[snum]) w.att[snum] = {};
  if (!w.att[snum][d]) w.att[snum][d] = { a:'', u:'' };

  w.att[snum][d][field] = sel.value;
  sel.className = field === 'a' ? `s-${sel.value}` : `s-unif-${sel.value}`;
  updateStats(wi);

  const student = sts[cur].find(s => Number(s.num) === Number(snum));
  if (!student) return;

  const payload = {
    action: 'saveRecord',
    curso: cur,
    studentNum: student.num,
    studentName: student.name,
    fecha: d
  };

  if (field === 'a') payload.asistencia = sel.value;
  if (field === 'u') payload.uniforme = sel.value;

  try {
    await apiPost(payload);
  } catch (error) {
    console.error('Error guardando en Google Sheets:', error);
  }
}

function changeDate(input, wi, di) {
  const w = wks[cur][wi];
  const old = w.dates[di];
  const nw = input.value;

  if (!nw || nw === old) return;

  w.dates[di] = nw;

  Object.keys(w.att).forEach(sn => {
    w.att[sn][nw] = w.att[sn][old] || { a:'', u:'' };
    delete w.att[sn][old];
  });

  render();
}

function updateStats(wi) {
  const el = document.getElementById(`stats-${wi}`);
  if (!el) return;

  const w = wks[cur][wi];
  const ss = sts[cur];

  let a = 0, n = 0, t = 0, e = 0, ui = 0;

  ss.forEach(s => w.dates.forEach(d => {
    if (isHol(d)) return;

    const r = w.att[s.num] && w.att[s.num][d];
    if (!r) return;

    if (r.a === 'asiste') a++;
    if (r.a === 'no-asiste') n++;
    if (r.a === 'tarde') t++;
    if (r.a === 'excusa') e++;
    if (r.u === 'bad') ui++;
  }));

  el.innerHTML = `
    <div class="stat-item"><span class="stat-dot" style="background:#3ecf8e"></span><span class="stat-label">Asiste</span><span class="stat-val" style="color:#3ecf8e">${a}</span></div>
    <div class="stat-item"><span class="stat-dot" style="background:#f16565"></span><span class="stat-label">No asiste</span><span class="stat-val" style="color:#f16565">${n}</span></div>
    <div class="stat-item"><span class="stat-dot" style="background:#f5a623"></span><span class="stat-label">Llegó tarde</span><span class="stat-val" style="color:#f5a623">${t}</span></div>
    <div class="stat-item"><span class="stat-dot" style="background:#4f8ef7"></span><span class="stat-label">Excusa</span><span class="stat-val" style="color:#4f8ef7">${e}</span></div>
    <div class="stat-item"><span class="stat-dot" style="background:#f16565"></span><span class="stat-label">Unif. inadecuado</span><span class="stat-val" style="color:#f16565">${ui}</span></div>`;
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('newStudentName').value = '';
  setTimeout(() => document.getElementById('newStudentName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function confirmAdd() {
  const name = document.getElementById('newStudentName').value.trim().toUpperCase();
  if (!name || !cur) return;

  const ss = sts[cur];
  ss.push({ num: ss.length + 1, name });
  ss.sort((a, b) => a.name.localeCompare(b.name, 'es'));
  ss.forEach((s, i) => s.num = i + 1);

  ensureWeekStudentMap(cur);
  document.getElementById('studentChip').textContent = `${ss.length} estudiantes`;

  try {
    await syncStudentsToSheet(cur);
  } catch (error) {
    console.error('Error sincronizando estudiantes:', error);
  }

  closeModal();
  render();
}

function nextWeekStart(courseId) {
  const ws = wks[courseId];
  const last = new Date(ws[ws.length - 1].start + 'T00:00:00');
  last.setDate(last.getDate() + 7);
  return iso(last);
}

function addWk(courseId) {
  const start = nextWeekStart(courseId);
  const dates = wkDates(start);

  const att = {};
  sts[courseId].forEach(s => {
    att[s.num] = {};
    dates.forEach(d => {
      att[s.num][d] = { a:'', u:'' };
    });
  });

  wks[courseId].push({
    start,
    dates,
    att,
    num: wks[courseId].length + 1,
    month: MONTHS[new Date(start + 'T00:00:00').getMonth()]
  });
}

function addMonth() {
  for (let i = 0; i < 4; i++) addWk(cur);
  render();
}

function exportCSV() {
  const ss = sts[cur];
  const ws = wks[cur];
  let csv = '\uFEFF';
  csv += `Curso ${cur}\n`;
  csv += 'N°,Estudiante';

  ws.forEach(w => w.dates.forEach(d => {
    if (!isHol(d)) csv += `,${d} Asist.,${d} Uniforme`;
  }));
  csv += '\n';

  ss.forEach(s => {
    csv += `${s.num},"${s.name}"`;
    ws.forEach(w => w.dates.forEach(d => {
      if (!isHol(d)) {
        const r = (w.att[s.num] && w.att[s.num][d]) || { a:'', u:'' };
        csv += `,${r.a},${r.u}`;
      }
    }));
    csv += '\n';
  });

  const b = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `asistencia_curso${cur}.csv`;
  a.click();
}

document.getElementById('courseSearch').addEventListener('input', renderSidebar);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderSidebar();
</script>
